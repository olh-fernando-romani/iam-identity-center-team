name: Update TEAM Application (Production)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/bootstrap-team.yml"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: team-update-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  MANAGEMENT_ACCOUNT: ${{ vars.MANAGEMENT_ACCOUNT }}
  TEAM_ACCOUNT: ${{ vars.TEAM_ACCOUNT }}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (Role A via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/GitHubActions-TEAM-RoleA
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate parameters.sh
        shell: bash
        run: |
          set -euo pipefail
          cd deployment
          cat > parameters.sh <<'EOF'
          IDC_LOGIN_URL="${{ vars.IDC_LOGIN_URL }}"
          REGION="${{ vars.AWS_REGION }}"
          TEAM_ACCOUNT="${{ vars.TEAM_ACCOUNT }}"
          ORG_MASTER_PROFILE=""
          TEAM_ACCOUNT_PROFILE=""
          TEAM_ADMIN_GROUP="${{ vars.TEAM_ADMIN_GROUP }}"
          TEAM_AUDITOR_GROUP="${{ vars.TEAM_AUDITOR_GROUP }}"
          TAGS="${{ vars.TAGS }}"
          CLOUDTRAIL_AUDIT_LOGS="${{ vars.CLOUDTRAIL_AUDIT_LOGS }}"
          UI_DOMAIN="${{ vars.UI_DOMAIN }}"
          SECRET_NAME="${{ vars.SECRET_NAME }}"
          CACHE_TTL=604800
          EOF
      
      - name: Configure AWS credentials (Role B via role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TEAM_ROLE_B_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-chaining: true
          role-skip-session-tagging: true

      - name: Install git-remote-codecommit
        shell: bash
        run: |
          set -euo pipefail
          pipx install git-remote-codecommit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync CodeCommit repository (mirror GitHub main)
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          git clone "codecommit::${AWS_REGION}://team-idc-app" team-idc-app-codecommit
          cd team-idc-app-codecommit

          git remote add github "https://github.com/${{ github.repository }}.git"
          git fetch github main
          git reset --hard github/main
          git push --force origin main

      - name: Patch deploy.sh
        run: |
          cd deployment
          sed -i 's/^[[:space:]]*export[[:space:]]\+AWS_PROFILE=.*/unset AWS_PROFILE/' deploy.sh
          sed -i '/aws codecommit create-repository/ s/^/#/' deploy.sh
          sed -i '/git remote remove origin/ s/^/#/' deploy.sh
          sed -i '/git remote add origin/ s/^/#/' deploy.sh
          sed -i '/git push origin main/ s/^/#/' deploy.sh

      - name: Deploy (CloudFormation update)
        shell: bash
        run: |
          set -euo pipefail
          cd deployment
          chmod +x deploy.sh
          ./deploy.sh

      - name: Wait for CloudFormation to settle (no hang on no-op)
        shell: bash
        run: |
          set -euo pipefail
          status="$(aws cloudformation describe-stacks \
            --stack-name TEAM-IDC-APP \
            --region "${AWS_REGION}" \
            --query "Stacks[0].StackStatus" --output text)"
          echo "Current stack status: ${status}"
          case "${status}" in
            *_IN_PROGRESS)
              # Try update waiter first; if this was a create, it will fail quickly and then create waiter will work.
              aws cloudformation wait stack-update-complete --stack-name TEAM-IDC-APP --region "${AWS_REGION}" \
                || aws cloudformation wait stack-create-complete --stack-name TEAM-IDC-APP --region "${AWS_REGION}"
              ;;
            *_COMPLETE)
              echo "Stack already complete: ${status}"
              ;;
            *)
              echo "Stack in failure/unknown terminal state: ${status}"
              aws cloudformation describe-stack-events \
                --stack-name TEAM-IDC-APP \
                --region "${AWS_REGION}" \
                --max-items 30 \
                --query "StackEvents[].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
                --output table
              exit 1
              ;;
          esac

      - name: Wait for Amplify build to finish (and surface logs)
        shell: bash
        run: |
          set -euo pipefail
      
          APP_ID="$(aws cloudformation describe-stacks \
            --stack-name TEAM-IDC-APP \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='AppId'].OutputValue" --output text)"
      
          if [[ -z "${APP_ID}" || "${APP_ID}" == "None" ]]; then
            APP_ID="$(aws amplify list-apps \
              --region "${AWS_REGION}" \
              --query "apps[?name=='TEAM-IDC-APP'].appId | [0]" \
              --output text)"
          fi
          [[ -n "${APP_ID}" && "${APP_ID}" != "None" ]] || { echo "Amplify AppId not found"; exit 1; }
      
          # Robust jobId extraction
          JOB_ID="$(aws amplify list-jobs --app-id "${APP_ID}" --branch-name main --max-items 1 --region "${AWS_REGION}" --output json \
            | jq -r '.jobSummaries[0].jobId // empty')"
      
          [[ -n "${JOB_ID}" ]] || { echo "Amplify jobId not found"; exit 1; }
          [[ "${JOB_ID}" =~ ^[0-9]+$ ]] || { echo "Invalid jobId: '${JOB_ID}'"; exit 1; }
      
          echo "Tracking Amplify jobId=${JOB_ID} for appId=${APP_ID}"
      
          deadline=$((SECONDS+3600))
          while (( SECONDS < deadline )); do
            job="$(aws amplify get-job --app-id "${APP_ID}" --branch-name main --job-id "${JOB_ID}" --region "${AWS_REGION}" --output json)"
            status="$(jq -r '.job.summary.status // "UNKNOWN"' <<< "${job}")"
            reason="$(jq -r '.job.steps[]? | select(.stepName=="BUILD") | .statusReason // empty' <<< "${job}" | head -n 1)"
            buildLogUrl="$(jq -r '.job.steps[]? | select(.stepName=="BUILD") | .logUrl // empty' <<< "${job}" | head -n 1)"
      
            echo "Amplify job ${JOB_ID} status=${status}"
            aws amplify get-job --app-id "${APP_ID}" --branch-name main --job-id "${JOB_ID}" --region "${AWS_REGION}" \
              --query "job.steps[].{name:stepName,status:status,start:startTime,end:endTime,statusReason:statusReason}" --output table || true
      
            case "${status}" in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED)
                echo "Amplify job failed: ${status}"
                [[ -n "${reason}" ]] && echo "BUILD statusReason: ${reason}"
                [[ -n "${buildLogUrl}" ]] && echo "BUILD logUrl: ${buildLogUrl}"
                exit 1
                ;;
              *) sleep 20 ;;
            esac
          done
      
          echo "Timed out waiting for Amplify job ${JOB_ID} to finish."
          exit 1
      
      - name: Configure Cognito SAML provider + client (robust/idempotent)
        shell: bash
        run: |
          set -euo pipefail

          [[ -n "${{ vars.SAML_METADATA_URL }}" ]] || { echo "Missing vars.SAML_METADATA_URL"; exit 1; }

          # Discover the TEAM user pool by name (stack does not output UserPoolId)
          USER_POOL_ID="$(aws cognito-idp list-user-pools \
            --max-results 60 \
            --region "${AWS_REGION}" \
            --query "UserPools[?contains(Name, 'team06dbb7fc')].Id | [0]" \
            --output text)"
          [[ -n "${USER_POOL_ID}" && "${USER_POOL_ID}" != "None" ]] || { echo "UserPoolId not found via list-user-pools"; exit 1; }

          CLIENT_ID="$(aws cognito-idp list-user-pool-clients --user-pool-id "${USER_POOL_ID}" --region "${AWS_REGION}" \
            --query "UserPoolClients[?contains(ClientName, 'clientWeb')].ClientId | [0]" --output text)"
          [[ -n "${CLIENT_ID}" && "${CLIENT_ID}" != "None" ]] || { echo "clientWeb client not found"; exit 1; }

          AMPLIFY_DOMAIN="$(aws cloudformation describe-stacks --stack-name TEAM-IDC-APP --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='DefaultDomain'].OutputValue" --output text)"
          [[ -n "${AMPLIFY_DOMAIN}" && "${AMPLIFY_DOMAIN}" != "None" ]] || { echo "DefaultDomain not found"; exit 1; }

          METADATA_URL="${{ vars.SAML_METADATA_URL }}"
          DESIRED_PROVIDER_NAME="idc"
          IDP_IDENTIFIER="team"

          # Detect current provider that already owns idp-identifier "team"
          # (Cognito doesn’t let "team" be attached to two providers)
          providers="$(aws cognito-idp list-identity-providers --user-pool-id "${USER_POOL_ID}" --region "${AWS_REGION}" --output json)"
          current_provider="$(jq -r --arg id "${IDP_IDENTIFIER}" '
            .Providers
            | map(select(.ProviderName != null))
            | map(.ProviderName)
            | .[0] // empty
          ' <<< "${providers}")"

          # Prefer updating an existing provider named idc if it exists; else update/create safely.
          exists_idc="$(jq -r '.Providers | map(select(.ProviderName=="idc")) | length' <<< "${providers}")"

          if [[ "${exists_idc}" -gt 0 ]]; then
            echo "Updating existing IdP: idc"
            aws cognito-idp update-identity-provider \
              --user-pool-id "${USER_POOL_ID}" \
              --provider-name "idc" \
              --provider-details "MetadataURL=${METADATA_URL}" \
              --attribute-mapping "email=Email" \
              --region "${AWS_REGION}"
            provider_for_client="idc"
          else
            echo "idc provider not found; attempting create."
            # If "team" is already associated to IAMIdentityCenter/other, create will fail; surface a clear message.
            aws cognito-idp create-identity-provider \
              --user-pool-id "${USER_POOL_ID}" \
              --provider-name "${DESIRED_PROVIDER_NAME}" \
              --provider-type SAML \
              --provider-details "MetadataURL=${METADATA_URL}" \
              --attribute-mapping "email=Email" \
              --idp-identifiers "${IDP_IDENTIFIER}" \
              --region "${AWS_REGION}" \
              || {
                echo "Create failed. Likely '${IDP_IDENTIFIER}' is already attached to another provider. Delete old IdP or migrate in a clean environment."
                exit 1
              }
            provider_for_client="${DESIRED_PROVIDER_NAME}"
          fi

          aws cognito-idp update-user-pool-client \
            --user-pool-id "${USER_POOL_ID}" \
            --client-id "${CLIENT_ID}" \
            --refresh-token-validity 1 \
            --supported-identity-providers "${provider_for_client}" \
            --allowed-o-auth-flows code \
            --allowed-o-auth-scopes "phone" "email" "openid" "profile" "aws.cognito.signin.user.admin" \
            --logout-urls "https://main.${AMPLIFY_DOMAIN}/" \
            --callback-urls "https://main.${AMPLIFY_DOMAIN}/" \
            --allowed-o-auth-flows-user-pool-client \
            --region "${AWS_REGION}"

      - name: Verify TEAM URL is reachable and sane
        shell: bash
        run: |
          set -euo pipefail
          APP_URL="$(aws amplify list-apps \
            --region "${AWS_REGION}" \
            --query "apps[?name=='TEAM-IDC-APP'].defaultDomain | [0]" \
            --output text)"
          [[ -n "${APP_URL}" && "${APP_URL}" != "None" ]] || { echo "Could not determine app URL"; exit 1; }
          URL="https://main.${APP_URL}/"
          echo "Checking ${URL}"
          deadline=$((SECONDS+600))
          while (( SECONDS < deadline )); do
            body="$(curl -fsSL "${URL}" || true)"
            if [[ -n "${body}" ]] && grep -qiE "TEAM|aws-amplify|<html" <<< "${body}"; then
              echo "TEAM application appears online."
              exit 0
            fi
            sleep 10
          done
          echo "TEAM did not become ready at ${URL}"
          exit 1
